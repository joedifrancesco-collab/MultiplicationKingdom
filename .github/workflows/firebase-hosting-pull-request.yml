name: Deploy to Firebase Hosting on PR

'on': pull_request

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Lint the code
        run: npm run lint

      - name: Build the app
        env:
          VITE_FIREBASE_API_KEY: AIzaSyCDBQg-OUAMA5IE6GqAvMkZ3bUFr1L5cPE
          VITE_FIREBASE_AUTH_DOMAIN: multiplication-kingdom-e8c53.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: multiplication-kingdom-e8c53
          VITE_FIREBASE_STORAGE_BUCKET: multiplication-kingdom-e8c53.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '21184528155'
          VITE_FIREBASE_APP_ID: '1:21184528155:web:a065544b566da6a2ce9dbe'
        run: npm run build

      - name: Deploy preview to Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
        run: |
          node -e "require('fs').writeFileSync(process.env.RUNNER_TEMP + '/sa_key.json', process.env.FIREBASE_SERVICE_ACCOUNT)"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa_key.json"
          npx firebase-tools hosting:channel:deploy pr-${{ github.event.pull_request.number }} --project multiplication-kingdom-e8c53
