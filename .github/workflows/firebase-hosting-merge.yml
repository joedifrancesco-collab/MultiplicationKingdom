name: Deploy to Firebase Hosting on merge

'on':
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Lint the code
        run: npm run lint

      - name: Build the app
        env:
          VITE_FIREBASE_API_KEY: AIzaSyCDBQg-OUAMA5IE6GqAvMkZ3bUFr1L5cPE
          VITE_FIREBASE_AUTH_DOMAIN: multiplication-kingdom-e8c53.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: multiplication-kingdom-e8c53
          VITE_FIREBASE_STORAGE_BUCKET: multiplication-kingdom-e8c53.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '21184528155'
          VITE_FIREBASE_APP_ID: '1:21184528155:web:a065544b566da6a2ce9dbe'
        run: npm run build

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
        run: |
          node -e "require('fs').writeFileSync(process.env.RUNNER_TEMP + '/sa_key.json', process.env.FIREBASE_SERVICE_ACCOUNT)"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa_key.json"
          npx firebase-tools deploy --only hosting --project multiplication-kingdom-e8c53

